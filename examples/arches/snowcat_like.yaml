arch:
  nodes:
  - !Memory
    name: MainMemory
    size: inf
    leak_power: 0
    area: 0
    actions:
    - {name: read, energy: 1, latency: 0}
    - {name: write, energy: 1, latency: 0}
    tensors:
      keep: ~Intermediates
      may_keep: All

  - !Memory
    name: GlobalBuffer
    size: 1024*1024*{{GLB_SIZE}}*8   # set GLB_SIZE in MiB
    leak_power: 0
    area: 0
    actions:
    - {name: read, energy: 0, latency: 0}
    - {name: write, energy: 0, latency: 0}
    tensors:
      keep: ~MainMemory
      may_keep: All

  - !Compute
    name: Mac
    leak_power: 0
    area: 0
    actions:
    - {name: compute, energy: 0, latency: 0}
    enabled: len(All) == 3
