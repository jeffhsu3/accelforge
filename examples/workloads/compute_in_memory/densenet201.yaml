    - 0 <= p0 < 112
    - 0 <= q0 < 112
    - 0 <= c0 < 3
    - 0 <= m0 < 64
    - 0 <= r0 < 7
    - 0 <= s0 < 7
    renames: {output: T0, input: I0, weight: W0}
