renames:
  einsums:
  - name: default
    tensor_accesses:
    - name: input
      source: Inputs & Intermediates
      expected_count: 1
    - name: output
      source: Outputs
      expected_count: 1
    - name: weight
      source: ~(input | output)
      expected_count: 1

workload:
  bits_per_value: {All: 8}
  rank_sizes: {N: {{BATCH_SIZE}}}

  einsums:
  - einsum: "T0[p0, q0, n, m0] = I0[n, c0, H: p0 * 4 + r0, W: q0 * 4 + s0] * W0[r0, s0, c0, m0]"
    iteration_space_shape:
    - 0 <= p0 < 55
    - 0 <= q0 < 55
    - 0 <= c0 < 3
    - 0 <= m0 < 64
    - 0 <= r0 < 11
    - 0 <= s0 < 11
    renames: {output: T0, input: I0, weight: W0}
  - einsum: "T1[p1, q1, n, m1] = I1[n, c1, H: p1 + r1, W: q1 + s1] * W1[r1, s1, c1, m1]"
    iteration_space_shape:
    - 0 <= p1 < 27
    - 0 <= q1 < 27
    - 0 <= c1 < 64
    - 0 <= m1 < 192
    - 0 <= r1 < 5
    - 0 <= s1 < 5
    renames: {output: T1, input: I1, weight: W1}
  - einsum: "T2[p2, q2, n, m2] = I2[n, c2, H: p2 + r2, W: q2 + s2] * W2[r2, s2, c2, m2]"
    iteration_space_shape:
    - 0 <= p2 < 13
    - 0 <= q2 < 13
    - 0 <= c2 < 192
    - 0 <= m2 < 8
    - 0 <= r2 < 3
    - 0 <= s2 < 3
    renames: {output: T2, input: I2, weight: W2}
  - einsum: "T3[p3, q3, n, m3] = I3[n, c3, H: p3 + r3, W: q3 + s3] * W3[r3, s3, c3, m3]"
    iteration_space_shape:
    - 0 <= p3 < 13
    - 0 <= q3 < 13
    - 0 <= c3 < 384
    - 0 <= m3 < 256
    - 0 <= r3 < 3
    - 0 <= s3 < 3
    renames: {output: T3, input: I3, weight: W3}
  - einsum: "T4[p4, q4, n, m4] = I4[n, c4, H: p4 + r4, W: q4 + s4] * W4[r4, s4, c4, m4]"
    iteration_space_shape:
    - 0 <= p4 < 13
    - 0 <= q4 < 13
    - 0 <= c4 < 256
    - 0 <= m4 < 256
    - 0 <= r4 < 3
    - 0 <= s4 < 3
    renames: {output: T4, input: I4, weight: W4}
  - einsum: "T5[p5, n, m5] = I5[n, c5, p5] * W5[c5, m5]"
    iteration_space_shape:
    - 0 <= p5 < 1
    - 0 <= c5 < 9216
    - 0 <= m5 < 4096
    renames: {output: T5, input: I5, weight: W5}
  - einsum: "T6[p6, n, m6] = I6[n, c6, p6] * W6[c6, m6]"
    iteration_space_shape:
    - 0 <= p6 < 1
    - 0 <= c6 < 4096
    - 0 <= m6 < 4096
    renames: {output: T6, input: I6, weight: W6}
  - einsum: "T7[p7, n, m7] = I7[n, c7, p7] * W7[c7, m7]"
    iteration_space_shape:
    - 0 <= p7 < 1
    - 0 <= c7 < 4096
    - 0 <= m7 < 1000
    renames: {output: T7, input: I7, weight: W7}
